<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Antennae -->
  <line x1="88" y1="32" x2="60" y2="8" stroke="#3a1e08" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="112" y1="32" x2="140" y2="8" stroke="#3a1e08" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="8" x2="42" y2="18" stroke="#3a1e08" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="140" y1="8" x2="158" y2="18" stroke="#3a1e08" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="100" cy="38" rx="16" ry="12" fill="#4a2810"/>
  <!-- Eyes -->
  <circle cx="92" cy="35" r="2.5" fill="#1a0a00"/>
  <circle cx="108" cy="35" r="2.5" fill="#1a0a00"/>
  <circle cx="91.5" cy="34.5" r="0.8" fill="#fff" opacity="0.6"/>
  <circle cx="107.5" cy="34.5" r="0.8" fill="#fff" opacity="0.6"/>

  <!-- Pronotum (shield behind head) -->
  <ellipse cx="100" cy="58" rx="22" ry="16" fill="#5a3010"/>
  <ellipse cx="100" cy="56" rx="18" ry="13" fill="#6a3a14" opacity="0.5"/>

  <!-- Wing covers (elytra) -->
  <ellipse cx="100" cy="105" rx="30" ry="52" fill="#5a3010"/>
  <!-- Left elytron detail line -->
  <path d="M 88 60 Q 75 90 78 150" stroke="#4a2810" stroke-width="1.2" fill="none" opacity="0.7"/>
  <!-- Right elytron detail line -->
  <path d="M 112 60 Q 125 90 122 150" stroke="#4a2810" stroke-width="1.2" fill="none" opacity="0.7"/>
  <!-- Center suture line -->
  <line x1="100" y1="58" x2="100" y2="155" stroke="#4a2010" stroke-width="1.5" opacity="0.6"/>
  <!-- Wing texture lines left -->
  <path d="M 84 80 Q 78 100 80 120" stroke="#4a2810" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 80 95 Q 74 108 77 125" stroke="#4a2810" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- Wing texture lines right -->
  <path d="M 116 80 Q 122 100 120 120" stroke="#4a2810" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M 120 95 Q 126 108 123 125" stroke="#4a2810" stroke-width="0.8" fill="none" opacity="0.4"/>

  <!-- Abdomen tip -->
  <ellipse cx="100" cy="155" rx="18" ry="8" fill="#4a2810"/>
  <!-- Cerci (tail appendages) -->
  <path d="M 94 162 Q 86 172 80 178" stroke="#3a1e08" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 106 162 Q 114 172 120 178" stroke="#3a1e08" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- LEFT LEGS (front to back) -->
  <!-- Front left leg -->
  <path d="M 82 72 L 62 62 L 44 70" stroke="#3a1e08" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Middle left leg -->
  <path d="M 76 100 L 52 92 L 32 105" stroke="#3a1e08" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Back left leg -->
  <path d="M 74 128 L 50 122 L 34 138" stroke="#3a1e08" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- RIGHT LEGS (front to back) -->
  <!-- Front right leg -->
  <path d="M 118 72 L 138 62 L 156 70" stroke="#3a1e08" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Middle right leg -->
  <path d="M 124 100 L 148 92 L 168 105" stroke="#3a1e08" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Back right leg -->
  <path d="M 126 128 L 150 122 L 166 138" stroke="#3a1e08" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Leg joint dots -->
  <circle cx="62" cy="62" r="1.5" fill="#4a2810"/>
  <circle cx="52" cy="92" r="1.5" fill="#4a2810"/>
  <circle cx="50" cy="122" r="1.5" fill="#4a2810"/>
  <circle cx="138" cy="62" r="1.5" fill="#4a2810"/>
  <circle cx="148" cy="92" r="1.5" fill="#4a2810"/>
  <circle cx="150" cy="122" r="1.5" fill="#4a2810"/>

  <!-- Body highlight/sheen -->
  <ellipse cx="94" cy="85" rx="8" ry="18" fill="#7a4820" opacity="0.25" transform="rotate(-5 94 85)"/>
</svg>
